repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: [--manifest-path, Cargo.toml, --]
      - id: clippy
        args: [--manifest-path, Cargo.toml, --, -D, warnings]

  - repo: local
    hooks:
      - id: check-version
        name: check dev-status classifier matches version
        entry: uv run python -B scripts/check_version.py
        language: system
        pass_filenames: false
        files: pyproject\.toml

      - id: pytest
        name: pytest
        entry: uv run python -B -m pytest tests/
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
